name: Feature request
description: Suggest an improvement or a new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        If this touches the physics, please note a source for any equations or
        constants — see the accuracy ("honesty") rule in CONTRIBUTING.md.
